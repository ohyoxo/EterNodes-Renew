name: Eternodes 续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 */28 * *'   # 每28天 UTC 03:00 执行

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:8080 -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org

      - name: ⚡ 执行续期
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: bash eternodes_renew.sh
